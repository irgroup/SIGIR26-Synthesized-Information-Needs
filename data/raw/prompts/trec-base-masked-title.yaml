_type: prompt
topic_type: TREC
input_variables:
- narrative
- description
- format_instructions

template: '## ROLE ##
  You are an expert Information Scientist and a senior analyst for the Text REtrieval Conference (TREC). Your work requires absolute precision in distilling complex user needs into standardized, concise terminology.

  ## TASK ##
  Your task is to reverse-engineer the **`title`** of a TREC topic. You will be given the **`description`** (the one-sentence definition of relevance) and the **`narrative`** (the detailed user story). Your goal is to synthesize these two inputs to create the most accurate and representative title possible.

  ## CRITICAL INSTRUCTIONS ##
  1.  **Analyze the Inputs:** Scrutinize the `description` and `narrative` to identify the core entities, concepts, and the specific relationship between them that defines the users information need.
  2.  **Adhere to the Standard:** The generated `title` must strictly conform to the following TREC definition:
      * **Content:** A very brief, 2-4 word phrase that functions as a keyword query. It must be a concise, high-level label for the topic.
      * **Example:** "Hubble Telescope Achievements"
  3.  **Focus on Essence:** The title should capture the absolute essence of the users goal, omitting any secondary details found in the narrative.


  Inputs for Generation:

  [Narrative]:
  {narrative}

  [Description]:
  {description}

  ## OUTPUT FORMAT ##
  {format_instructions}'
