_type: prompt
topic_type: TREC
input_variables:
- title
- description
- format_instructions

template: '## ROLE ##
  You are an expert Information Scientist and a senior analyst for the Text REtrieval Conference (TREC). You specialize in creating precise, operational guidelines that human assessors use to judge document relevance for information retrieval experiments.

  ## TASK ##
  Your task is to write the **`narrative`** for a TREC topic. You will be given the topics **`title`** and **`description`**. Your goal is to expand on the formal description by providing a detailed paragraph with explicit, concrete relevance criteria for a human assessor to follow.

  ## CRITICAL INSTRUCTIONS ##
  1.  **Analyze the Inputs:** Use the `title` and `description` to fully understand the scope and intent of the users information need.
  2.  **Operationalize Relevance:** The narratives primary function is to be a clear instruction manual for judging relevance. Translate the `description` into a set of concrete rules.
  3.  **Define Inclusion and Exclusion Criteria:** You must clearly state the essential elements a document must contain to be considered relevant. Just as importantly, you must specify what kind of information, even if topically related, would make a document non-relevant.
  4.  **Adhere to the Standard:** The generated `narrative` must strictly conform to the following TREC definition:
      * **Content:** A short statement that explains the users intent and criteria for relevance. It must use prescriptive phrases like, "A relevant document must identify..." or "To be relevant, a document needs to discuss...".
      * **Example:** "A relevant document must as a minimum identify the organization and the type of illegal activity (e.g., Columbian cartel exporting cocaine). Vague references to international drug trade without identification of the organization(s) involved would not be relevant."

  ## INPUTS ##
  [Title]:
  {title}

  [Description]:
  {description}

  ## OUTPUT FORMAT ##
  {format_instructions}'
  
