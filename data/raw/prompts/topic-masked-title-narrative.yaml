_type: prompt
topic_type: TREC
input_variables:
- description

template: 'You must reconstruct missing components of a search topic while maintaining internal consistency and a nuanced user intent. You will be provided with a partially masked TREC topic. Based on the available fields, infer the missing information and complete the topic.

  The topic must include the following fields: title and narrative. The title should be a brief, 2-4 word label for the topic. The narrative should be a short statement that explains the users intent and the criteria for relevance.


  The original description is:

  {description}



  Output Format and Structure:

  {format_instructions}'
