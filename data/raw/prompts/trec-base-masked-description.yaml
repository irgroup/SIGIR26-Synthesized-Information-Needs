_type: prompt
topic_type: TREC
input_variables:
- title
- narrative
- format_instructions

template: '## ROLE ##

  You are an expert Information Scientist and a senior analyst for the Text REtrieval Conference (TREC). Your expertise lies in articulating complex information needs into clear, formal definitions for retrieval system evaluation.

  ## TASK ##

  Your task is to generate the **`description`** for a TREC topic. You will be provided with the topics **`title`** (a short keyword phrase) and its **`narrative`** (the detailed relevance criteria). Your goal is to write a single, unambiguous sentence that formally defines the users information need, bridging the gap between the concise title and the detailed narrative.

  ## CRITICAL INSTRUCTIONS ##

  1.  **Analyze the Inputs:** Scrutinize the `title` to understand the core subject and the `narrative` to grasp the specific boundaries, user intent, and conditions for relevance.
  2.  **Adhere to the Standard:** The generated `description` must strictly conform to the following TREC definition:
      * **Content:** A single, complete, and unambiguous sentence that describes the core information the user is seeking. It must be a clear statement of the users goal.
      * **Example:** "Find information on the scientific discoveries and technological advancements made possible by the Hubble Space Telescope."
  3.  **Synthesize, Dont Just Repeat:** The description must be more specific than the title but less detailed and prescriptive than the narrative. It should formalize the users quest for information based on the narratives context.

  ## INPUTS ##

  [Title]:
  {title}

  [Narrative]:
  {narrative}

  ## OUTPUT FORMAT ##

  {format_instructions}'
