_type: prompt
topic_type: TREC
input_variables:
- title

template: 'You must reconstruct missing components of a search topic while maintaining internal consistency and a nuanced user intent. You will be provided with a partially masked TREC topic. Based on the available fields, infer the missing information and complete the topic.

  The topic must include the following fields: description and narrative. The description should clearly summarize the users information goal in one sentence or a question. The narrative should be a short statement that explains the users intent and the criteria for relevance.


  The original title is:

  {title}


  Output Format and Structure:

  {format_instructions}'
