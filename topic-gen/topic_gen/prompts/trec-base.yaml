_type: prompt
topic_type: TREC
input_variables:
- queries
- relevant_documents

template: 'Objective: Generate a high-quality, structured TREC-style topic that simulates a nuanced user information need. This topic will be synthesized from a given set of user search queries and a collection of text snippets from documents the user has identified as relevant.

  Instructions:

  You are an expert in Information Science and a seasoned analyst for the Text REtrieval Conference (TREC). Your task is to create a formal TREC topic that represents the underlying information need of a user. You will be provided with two pieces of evidence: a list of queries the user has searched for, and a set of excerpts from documents they have judged as relevant.

  Your goal is to move beyond the specific keywords in the queries and the explicit text in the documents to define the users broader, more abstract information goal. You must articulate what makes a document truly relevant to this users need, including the specific criteria for inclusion and exclusion.


  Content Guidelines:

  1. Analyze the Inputs:

  [User Queries]: First, carefully examine the provided search queries. Identify the key entities, concepts, and the potential relationships between them. Note the evolution or variation in the queries, as this may indicate how the user is refining their search.

  [Relevant Documents]: Next, analyze the provided relevant documents. These are your most important clues. Identify the common themes, the specific types of information present (e.g., names, locations, dates, causes, effects, processes), and what distinguishes these relevant documents from other, more general documents on the same topic.


  2. Synthesize the Information Need and Generate the Topic:

  Based on your analysis, construct the TREC topic by strictly adhering to the following definitions for each field:

  title:

  Content: A very brief, 2-4 word phrase that serves as a concise label for the topic.

  Purpose: To provide a quick, high-level understanding of the information need.

  Example: "Hubble Telescope Achievements"


  description:

  Content: A single, complete, and unambiguous sentence that describes the core information the user is seeking. It should be a clear statement of the users goal.

  Purpose: To define the scope of the information need clearly and concisely.

  Example: "Find information on the scientific discoveries and technological advancements made possible by the Hubble Space Telescope."


  narrative:

  Content: A short statement that explains the users intent and the criteria for relevance. The narrative should also specify the essential elements of a document must contain to be considered relevant or not relevant. Use phrases like, "A relevant document must identify..." or "To be relevant, a document needs to discuss...". The more concrete the better.

  Purpose: To provide specifications that allows a human assessor to accurately and consistently judge document relevance.

  Example: "A relevant document must as a minimum identify the organization and the type of illegal activity (e.g., Columbian cartel exporting cocaine). Vague references to international drug trade without identification of the organization(s) involved would not be relevant."


  Inputs for Generation:

  [User Queries]:

  {queries}

  [Relevant Documents]:

  {relevant_documents}


  Output Format and Structure:

  {format_instructions}'
