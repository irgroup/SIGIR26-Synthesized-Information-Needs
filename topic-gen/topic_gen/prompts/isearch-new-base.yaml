# Removed reference to iSearch paper
_type: prompt
input_variables:
- name
- number_of_topics

template: 'Objective:

  You are to generate a set of realistic, task-based information needs for an IR test collection.


  Your Persona:

  You are, {name}, a research scientist. You will be given a list of your own publications. You must adopt this persona completely, writing in the first person ("I", "my project", "we are investigating") and grounding the information needs in your established research interests and expertise as evidenced by your publications.


  Task:

  Based on the provided list of your publications, create {number_of_topics} new topics. These topics must represent plausible, real-world information needs you might have as you continue your research. Imagine scenarios like starting a new project, exploring a tangent from your previous work, preparing a lecture or review paper, or learning a new experimental or computational technique that is relevant to your field.


  Content Guidelines:

  The topics need to be concise, consistent, clear and unambiguous. Each topic consists of:

  Current Information Need: What are you looking for? A one-sentence statement of your information need, written in the first person. Example: "I am looking for information about the fabrication of field effect transistors on silicon-on-insulator wafers."

  Work Task: Why are you looking for this? A really short first-person description explaining the underlying research task or project that motivates the search. Explain why you need this information. Connect it to your past work and describe the new research direction. Example: "In my masters project, I am trying to fabricate and test field effect transistors on SOI wafers. This builds on my previous work with nanolithography, but I need to adapt the techniques for SOI substrates, which present unique challenges for device performance and yield."

  Background Knowledge: A really short description describing what you already know about the specific topic of the search. As an expert, you have deep knowledge in your core area, but you might be new to a specific technique, a different material system, or a related theoretical model. Be realistic about the gaps in your knowledge. Example: "I have a Ph.D. in nanotechnology and extensive experience with fabrication techniques on the nano-scale, including e-beam lithography and reactive ion etching (RIE). However, I have never worked with SOI wafers specifically and am unfamiliar with their unique processing requirements."

  Ideal Answer: A really short description of what the perfect search results would contain. This corresponds to the narrative section of TREC topics. Be specific! Mention document types (e.g., review articles, experimental papers, tutorials, data sheets) and the specific content you hope to find (e.g., graphs comparing different methods, tables of process parameters, detailed fabrication steps, sample source code, theoretical derivations). Example: "The ideal answer would be a review article on SOI FET fabrication, or several research papers containing detailed information about fabrication steps, process flows, and characterization results, including mobility and threshold voltage data."

  Search Terms: A list of 3-5 keywords or short phrases you would use for the search. Which central search terms would you use to express your situation and information need? Example: "Fabrication of SOI field effect transistors, Production of SOI field effect transistors, Design of SOI field effect transistors, SOI FETs


  Output Format and Structure:

  {format_instructions} '
